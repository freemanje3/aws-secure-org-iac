# .github/workflows/terraform.yml
name: "Terraform Enterprise Deployment"

on:
  push:
    branches:
      - main
  pull_request:

# CRITICAL: These permissions are required for OIDC to work!
permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    # Tell the pipeline to only look at the organization folder
    defaults:
      run:
        working-directory: ./organization

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check || true

      - name: Execute One-Time State Migrations
        run: |
          terraform force-unlock -force 81377acb-a292-3cc6-54c1-4b3924c72226 || true
          bash pre_apply_fixes.sh
          bash org_state_migration.sh
          bash bootstrap_state_migration.sh

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color
        continue-on-error: true

      - name: Terraform Apply
        # Only apply automatically if the code is merged into the 'main' branch
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve
